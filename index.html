<!DOCTYPE html>

<html>
<head>
<title>TaskFlow</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #8fa3c7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* LOGIN CARD */
.card {
background: transparent;
width: 320px;
text-align: center;
color: white;
}

input {
width: 100%;
padding: 12px;
margin: 8px 0;
border: none;
border-radius: 4px;
}

button {
width: 100%;
padding: 12px;
margin-top: 10px;
background: #5c7fb8;
border: none;
color: white;
cursor: pointer;
border-radius: 4px;
}

.link {
margin-top: 10px;
font-size: 14px;
cursor: pointer;
text-decoration: underline;
}

.hidden {
display: none;
}

/* TASK PAGE */
.taskBox {
background: #161b22;
padding: 20px;
border-radius: 10px;
width: 320px;
color: white;
}

ul {
padding: 0;
list-style: none;
}

li {
background: #0d1117;
margin: 5px;
padding: 8px;
border-radius: 5px;
display: flex;
justify-content: space-between;
} </style>

</head>

<body>

<!-- LOGIN PAGE -->

<div class="card" id="loginPage">
  <h2>Sign in</h2>

  <input id="luser" placeholder="Username">
  <input id="lpass" placeholder="Password" type="password">

<button onclick="login()">Login</button>

  <div class="link" onclick="showRegister()">Create account</div>
</div>

<!-- REGISTER PAGE -->

<div class="card hidden" id="registerPage">
  <h2>Register</h2>

  <input id="ruser" placeholder="Username">
  <input id="remail" placeholder="Email">
  <input id="rpass" placeholder="Password" type="password">

<button onclick="register()">Register</button>

  <div class="link" onclick="showLogin()">Back to login</div>
</div>

<!-- TASK PAGE -->

<div class="taskBox hidden" id="taskPage">
  <h2>Your Tasks</h2>

  <input id="task" placeholder="New task">
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>
</div>

<script>
const API = "https://new-1-zgyr.onrender.com";
let token = "";

// SWITCH UI
function showRegister() {
  loginPage.classList.add("hidden");
  registerPage.classList.remove("hidden");
}

function showLogin() {
  registerPage.classList.add("hidden");
  loginPage.classList.remove("hidden");
}

// REGISTER
async function register() {
  await fetch(API + "/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: ruser.value,
      email: remail.value,
      password: rpass.value
    })
  });
  alert("Registered!");
  showLogin();
}

// LOGIN
async function login() {
  const res = await fetch(API + "/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: luser.value,
      password: lpass.value
    })
  });

  const data = await res.json();
  token = data.access_token;

  loginPage.classList.add("hidden");
  taskPage.classList.remove("hidden");

  load();
}

// ADD TASK
async function addTask() {
  await fetch(API + "/tasks", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      title: task.value,
      description: "test"
    })
  });

  task.value = "";
  load();
}

// LOAD TASKS
async function load() {
  const res = await fetch(API + "/tasks", {
    headers: {"Authorization": "Bearer " + token}
  });

  const data = await res.json();
  list.innerHTML = "";

  data.items.forEach(t => {
    list.innerHTML += `
      <li>
        ${t.title}
        <button onclick="del(${t.id})">X</button>
      </li>`;
  });
}

// DELETE
async function del(id) {
  await fetch(API + "/tasks/" + id, {
    method: "DELETE",
    headers: {"Authorization": "Bearer " + token}
  });
  load();
}
</script>

</body>
</html>
